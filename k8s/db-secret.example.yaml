apiVersion: v1
kind: Secret
metadata:
  name: gke-demo-db-secret
  namespace: gke-demo
type: Opaque
stringData:
  # Format: project-id:region:instance-id
  instance_connection_name: "your-project:your-region:your-instance"
  db_user: "app_user"
  db_password: "replace-with-strong-password"
  db_name: "app_db"